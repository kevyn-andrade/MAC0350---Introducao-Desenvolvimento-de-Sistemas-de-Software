<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Jupiterweb</title>
        <link rel="icon" href="https://play-lh.googleusercontent.com/T22kaVLibERYyFJKoDXXGiXnZ2Njee-rKDmjzjFmu_MQ7PRW_PYmso4pGnJTLJuM6A" type="image/png">
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f0f0f0;
            }

            header {
                background-color: #f68f00;
                padding: 10px 20px;
                display: flex;
                align-items: center;
                gap: 10px;
                border-radius: 8px;
            }

            header img {
                height: 50px;
            }

            .container {
                width: 350px;
                margin: 60px auto;
                background-color: white;
                padding: 30px;
                border: 1px solid #ccc;
                border-radius: 8px;
            }

            h2 {
                color: #284dc9;
                margin-bottom: 20px;
            }

            label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }

            input {
                width: 100%;
                padding: 8px;
                margin-bottom: 15px;
                border: 1px solid #ccc;
                box-sizing: border-box;
            }

            button {
                width: 100%;
                padding: 10px;
                background-color: #f68f00;
                color: white;
                border: none;
                cursor: pointer;
                font-size: 16px;
                border-radius: 8px;
            }

            button:hover {
                background-color: #f68f00;
            }
        </style>
    </head>
    <body>

        <header>
            <img src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo.png">
            <img src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo-texto.png">
        </header>

        <div class="container">
            <h2>Login</h2>
            <form>
                <label>Número USP</label>
                <input type="text" name="primeiro" placeholder="Digite seu número USP">

                <label>Senha</label>
                <input type="password" name="senha" placeholder="Digite sua senha">

                <button type="submit">Entrar</button>
            </form>
        </div>

    </body>
</html>
