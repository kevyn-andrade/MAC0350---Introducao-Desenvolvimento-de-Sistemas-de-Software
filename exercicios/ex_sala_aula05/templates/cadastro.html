<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 60px auto; background: #f5f5f5; }
        h1 { color: #333; }
        form { background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        label { display: block; margin-top: 12px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 6px;
                box-sizing: border-box; font-size: 1rem; }
        button { margin-top: 18px; width: 100%; padding: 12px; background: #ff690a; color: white;
                 border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        button:hover { background: #e55a00; }
        #resposta { margin-top: 12px; padding: 10px; border-radius: 6px; text-align: center; }
        .ok { background: #d4edda; color: #155724; }
        .erro { background: #f8d7da; color: #721c24; }
        p { text-align: center; margin-top: 12px; }
    </style>
</head>
<body>
    <h1>Cadastro</h1>
    <form>
        <label>Nome</label>
        <input type="text" id="nome" placeholder="Seu nome">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Sua senha">
        <label>Bio</label>
        <input type="text" id="bio" placeholder="Uma frase sobre você">
        <button type="button" onclick="cadastrar()">Cadastrar</button>
    </form>
    <div id="resposta"></div>
    <p><a href="/login">Já tem conta? Faça login</a></p>

    <script>
        async function cadastrar() {
            const dados = {
                nome: document.getElementById('nome').value,
                senha: document.getElementById('senha').value,
                bio: document.getElementById('bio').value
            };
            const resp = await fetch('/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            const resultado = await resp.json();
            const div = document.getElementById('resposta');
            div.textContent = resp.ok ? resultado.message : `Erro: ${resultado.detail}`;
            div.className = resp.ok ? 'ok' : 'erro';
        }
    </script>
</body>
</html>
