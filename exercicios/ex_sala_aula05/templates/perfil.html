<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 60px auto; background: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .avatar { width: 80px; height: 80px; background: #ff690a; border-radius: 50%;
                  display: flex; align-items: center; justify-content: center;
                  font-size: 2rem; color: white; margin-bottom: 16px; }
        h1 { margin: 0 0 8px; color: #333; }
        .bio { color: #666; margin-bottom: 20px; }
        form button { padding: 10px 20px; background: #dc3545; color: white; border: none;
                      border-radius: 6px; cursor: pointer; font-size: 1rem; }
        form button:hover { background: #c82333; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">{{ user.nome[0] | upper }}</div>
        <h1>{{ user.nome }}</h1>
        <p class="bio">{{ user.bio }}</p>
        <!-- Logout -->
        <form method="POST" action="/logout">
            <button type="submit">Sair</button>
        </form>
    </div>
</body>
</html>
