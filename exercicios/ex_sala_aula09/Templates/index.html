<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4"></script>
    <title>Meu Site</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; background: #1e1e1e; color: #e0e0e0; }
        h1 { color: #ff690a; }
        nav { display: flex; gap: 10px; margin: 16px 0; }
        nav button {
            padding: 8px 18px; border: 2px solid #ff690a; background: transparent;
            color: #ff690a; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        nav button:hover { background: #ff690a22; }
        hr { border: 1px solid #333; }
        .fade-out.htmx-swapping { opacity: 0; transition: opacity 1s ease-out; }
    </style>
</head>
<body class="fade-out">
    <h1>Meu Site</h1>
    <p>Bem vindo ao meu site!</p>
    <nav>
        <button hx-get="/lista" hx-target="main">Lista de alunos</button>
        <button hx-get="/editarAlunos" hx-target="main">Editar lista de alunos</button>
        <button hx-delete="/apagar"
                hx-target="body"
                hx-confirm="Deseja deletar meu site?"
                hx-swap="outerHTML swap:1s"
                id="apagar">
            Deletar site
        </button>
    </nav>
    <hr>
    <main hx-get="/lista" hx-target="main" hx-trigger="load"></main>
</body>
</html>
