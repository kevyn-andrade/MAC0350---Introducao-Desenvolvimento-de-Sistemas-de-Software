<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Físico</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0d0d0d;
            --surface:  #181818;
            --surface2: #222222;
            --border:   #2e2e2e;
            --red:      #c0392b;
            --red-dim:  #922b21;
            --red-glow: rgba(192,57,43,0.25);
            --text:     #f0ece8;
            --muted:    #888880;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--red);
            text-decoration: none;
        }

        .nav-brand span { color: var(--text); }

        .nav-links { display: flex; gap: 0.5rem; }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .nav-links a.active {
            color: var(--red);
            border-bottom: 2px solid var(--red);
        }

        /* MAIN */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        /* SECTION TITLE */
        h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--text);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        h2::before {
            content: '';
            display: block;
            width: 4px;
            height: 1.4rem;
            background: var(--red);
            border-radius: 2px;
        }

        /* FORM */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        select, input[type="number"], input[type="date"], input[type="text"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.65rem 0.9rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: auto;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--red);
            box-shadow: 0 0 0 3px var(--red-glow);
        }

        select option { background: var(--surface2); }

        /* BUTTON */
        .btn-primary {
            background: var(--red);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary:hover { background: var(--red-dim); }
        .btn-primary:active { transform: scale(0.98); }

        /* TABLE */
        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead tr {
            background: var(--surface2);
            border-bottom: 2px solid var(--red);
        }

        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr:hover { background: var(--surface2); }

        td {
            padding: 0.75rem 1rem;
            color: var(--text);
        }

        /* INLINE ACTIONS */
        .btn-edit {
            background: transparent;
            border: 1px solid #b7950b;
            color: #f1c40f;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-right: 4px;
        }

        .btn-edit:hover { background: rgba(241,196,15,0.12); }

        .btn-delete {
            background: transparent;
            border: 1px solid var(--red-dim);
            color: var(--red);
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-delete:hover { background: var(--red-glow); }

        /* SEARCH INPUT */
        .search-wrap { position: relative; margin-bottom: 1.5rem; }

        .search-wrap input {
            padding-left: 2.5rem;
            font-size: 1rem;
        }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        /* EDIT FORM INSIDE TABLE */
        .edit-input {
            background: var(--surface2) !important;
            border: 1px solid var(--red) !important;
            color: var(--text) !important;
            padding: 0.35rem 0.6rem !important;
            border-radius: 4px;
            width: 100px;
            font-size: 0.85rem;
        }

        .btn-save {
            background: #1a6b3c;
            border: none;
            color: #fff;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-save:hover { background: #21874d; }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--muted);
            font-size: 0.9rem;
        }


        .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
        .htmx-request .htmx-indicator { opacity: 1; }

        /* HTMX indicator */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">MEU<span>FÍSICO</span></a>
        <div class="nav-links">
            <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Registrar</a>
            <a href="/buscar_tela" {% if request.url.path == '/buscar_tela' %}class="active"{% endif %}>Buscar</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
