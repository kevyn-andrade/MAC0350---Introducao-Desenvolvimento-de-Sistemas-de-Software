{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Buscar Evolução</h2>
    <div class="search-wrap" style="display:flex; align-items:center; gap:0.75rem;">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text"
               name="q"
               hx-get="/buscar"
               hx-trigger="keyup changed delay:400ms, load"
               hx-target="#resultados-busca"
               hx-indicator="#spinner"
               placeholder="Buscar por categoria..."
               autocomplete="off"
               style="flex:1;">
        <span id="spinner" class="htmx-indicator">
            <span class="spinner"></span>
        </span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Categoria</th>
                    <th>Valor (kg)</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="resultados-busca">
                <tr><td colspan="4" class="empty-state">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
