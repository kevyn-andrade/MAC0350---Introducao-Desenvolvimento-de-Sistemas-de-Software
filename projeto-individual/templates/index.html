{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Nova Medida</h2>
    <form hx-post="/medidas/"
          hx-target="#tabela-medidas"
          hx-swap="afterbegin"
          hx-on::after-request="this.reset()">
        <div class="form-grid">
            <select name="categoria_id" required>
                {% for cat in categorias %}
                    <option value="{{ cat.id }}">{{ cat.nome }}</option>
                {% endfor %}
            </select>
            <input type="number" step="0.1" min="0" name="valor"
                   placeholder="Valor (kg)" required>
            <input type="date" name="data" required>
        </div>
        <button type="submit" class="btn-primary">Salvar Medida</button>
    </form>
</div>

<div class="card">
    <h2>Histórico</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-medidas">
                {% for medida in medidas %}
                    {% include 'linha_medida.html' %}
                {% else %}
                    <tr><td colspan="4" class="empty-state">Nenhuma medida registrada ainda.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
